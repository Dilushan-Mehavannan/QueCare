name: mobile
description: "QueueCare Patient Mobile Application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Core Requested Stack
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  socket_io_client: ^3.0.0
  google_maps_flutter: ^2.6.1
  firebase_messaging: ^15.0.1
  go_router: ^14.2.0

  # Utility UI Dependencies
  dio: ^5.4.3+1
  pinput: ^5.0.0
  intl_phone_field: ^3.2.0
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.5

  hive: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
